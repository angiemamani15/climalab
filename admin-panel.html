<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaLab | Panel Administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="herramientas.css">
</head>
<body>

    <!-- ======================== -->
    <!-- NAVBAR ADMIN -->
    <!-- ======================== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="fa-solid fa-user-shield me-2" style="color: #289E2B;"></i>
                <span>Admin <span style="color:#289E2B;">ClimaLab</span></span>
            </a>
            <div class="d-flex align-items-center">
                <span class="text-light me-3" style="font-size: 0.85rem;">
                    <i class="fa-regular fa-circle-check text-success me-1"></i>Conectado
                </span>
                <button class="btn btn-outline-danger btn-sm" id="btnCerrarSesion">
                    <i class="fa-solid fa-sign-out-alt me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>

    <!-- ======================== -->
    <!-- PANEL ADMIN -->
    <!-- ======================== -->
    <section class="admin-panel-section">
        <div class="container">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="fw-bold" style="color: #08224C;">
                        <i class="fa-solid fa-users-gear text-success me-2"></i>Gestión de Candidatos
                    </h1>
                    <p class="text-muted">Administrá los CVs y postulantes registrados.</p>
                </div>
                <div>
                    <span class="badge bg-success fs-6 p-2" id="totalCandidatosBadge">
                        <i class="fa-regular fa-user me-1"></i>0 candidatos
                    </span>
                </div>
            </div>

            <!-- Estadísticas -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card stat-card-admin">
                        <div class="card-body">
                            <h6 class="text-muted">Total CVs</h6>
                            <h2 class="text-primary" id="totalCandidatos">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card-admin">
                        <div class="card-body">
                            <h6 class="text-muted">CVs con archivo</h6>
                            <h2 class="text-success" id="cvsConArchivo">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card-admin">
                        <div class="card-body">
                            <h6 class="text-muted">Puestos únicos</h6>
                            <h2 class="text-warning" id="puestosUnicos">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buscador y Filtros -->
            <div class="card shadow-sm p-3 mb-4">
                <div class="row g-3">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-search"></i></span>
                            <input type="text" class="form-control" id="buscadorAdmin" placeholder="Buscar por nombre, email o puesto...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select class="form-select" id="filtroPuestoAdmin">
                            <option value="todos">Todos los puestos</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-outline-danger w-100" id="btnEliminarTodosAdmin">
                            <i class="fa-solid fa-trash me-1"></i>Eliminar todos
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tabla de Candidatos -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th><i class="fa-regular fa-user me-1"></i>Nombre</th>
                                    <th><i class="fa-regular fa-envelope me-1"></i>Email</th>
                                    <th><i class="fa-regular fa-briefcase me-1"></i>Puesto</th>
                                    <th><i class="fa-regular fa-calendar me-1"></i>Fecha</th>
                                    <th><i class="fa-regular fa-file me-1"></i>CV</th>
                                    <th><i class="fa-regular fa-gear me-1"></i>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCandidatosAdmin">
                                <!-- Cargado dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Mensaje vacío -->
            <div id="mensajeVacioAdmin" class="text-center py-5 d-none">
                <i class="fa-regular fa-face-smile fa-4x text-muted mb-3"></i>
                <h5 class="text-muted">No hay candidatos registrados</h5>
                <p class="text-muted">Los CVs se mostrarán aquí cuando los postulantes se registren.</p>
            </div>

        </div>
    </section>

    <!-- ======================== -->
    <!-- NOTIFICACIÓN -->
    <!-- ======================== -->
    <div id="notificacionAdmin"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin-panel.js"></script>
</body>
</html>
