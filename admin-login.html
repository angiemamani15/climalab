<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaLab | Acceso Administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="herramientas.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light navbar-scroll fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.jpeg" alt="ClimaLab" class="logo">
                <span class="ms-2 titulo-logo">Clima<span style="color:#289E2B">Lab</span></span>
            </a>
            <a href="herramientas.html" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-arrow-left me-1"></i>Volver
            </a>
        </div>
    </nav>

    <section class="login-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div class="card login-card shadow">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="fa-solid fa-user-shield text-success" style="font-size: 3rem;"></i>
                                <h3 class="mt-2">Acceso Administrador</h3>
                                <p class="text-muted small">Ingresá tus credenciales para gestionar candidatos</p>
                            </div>

                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">USUARIO</label>
                                    <input type="text" id="loginUser" class="form-control" placeholder="admin" value="admin">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">CONTRASEÑA</label>
                                    <input type="password" id="loginPass" class="form-control" placeholder="••••••••" value="1234">
                                </div>

                                <button type="submit" class="btn btn-climalab w-100">
                                    <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar
                                </button>

                                <div id="loginError" class="mt-3 text-center text-danger small" style="display: none;">
                                    <i class="fa-solid fa-circle-exclamation me-1"></i>Usuario o contraseña incorrectos
                                </div>
                            </form>

                            <div class="text-center mt-4">
                                <small class="text-muted">
                                    <i class="fa-regular fa-key me-1"></i>Credenciales: admin / 1234
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
